# Dense GPT-2 Medium Configuration
# This configuration matches GPT-2 medium exactly (~355M parameters)
# Based on GPT-2 medium: 24 layers, 1024 hidden, 16 heads
# GPU Memory: 55GB
experiment_name: "gpt2-dense-medium"
output_dir: "./outputs"

model:
  model_type: "dense"
  vocab_size: 50257
  n_embd: 1024              # GPT-2 medium dimension
  n_layer: 24               # GPT-2 medium layers
  n_head: 16                # GPT-2 medium heads

data:
  data_path: "./edu_fineweb10B"
  use_sharded: true

training:
  # Batch size configuration
  total_batch_size: 524288      # 0.5M tokens
  per_device_batch_size: 32     # 32 samples per device
  sequence_length: 1024         # 1024 tokens per sample
  
  learning_rate: 3.0e-4
  min_lr: 3.0e-5
  warmup_steps: 2000
  max_epochs: 1.0               # Train for 1 epoch
  dataset_tokens: 10_000_000_000  # 10B tokens
  eval_interval: 500
  save_interval: 5000
  grad_clip: 1.0
  weight_decay: 0.1
  
logging:
  use_wandb: true
  log_interval: 10 