# Dense GPT2 model configuration
experiment_name: "gpt2-dense"
output_dir: "./outputs"

model:
  model_type: "dense"
  vocab_size: 50257
  n_embd: 768
  n_layer: 12
  n_head: 12

data:
  data_path: "./edu_fineweb10B"
  use_sharded: true

training:
  # New batch size configuration
  total_batch_size: 524288      # 0.5M tokens
  per_device_batch_size: 16     # 16 samples per device
  sequence_length: 1024         # 1024 tokens per sample
  
  learning_rate: 6.0e-4
  min_lr: 6.0e-5
  warmup_steps: 2000
  max_epochs: 1.0               # Train for 1 epoch
  dataset_tokens: 10_000_000_000  # 10B tokens
  eval_interval: 500
  save_interval: 5000
  grad_clip: 1.0
  weight_decay: 0.1
  
logging:
  use_wandb: true
  log_interval: 10 