# Debug configuration for testing visualization and eval metrics
# Use case: Quick iteration on metric visualization and eval-time analysis
# Run: python train.py --config configs/debug_viz.yaml
experiment_name: "debug-viz"
output_dir: "./outputs"

model:
  model_type: "gec_shared"
  vocab_size: 50257
  n_embd: 128
  n_layer: 12              # 12 layers to test every-4 pattern: {0, 4, 8, 11}
  n_head: 4
  granularity: 2           # G: d_ff / d_expert = 512 / 256 = 2
  expansion: 2             # E: routed expert expansion = 2
  # GEC_shared: n_experts = (G × E) + 1 = 5 (4 routed + 1 shared, 2.5x expansion)
  shared_expert_dim: 256   # d_ff / G = 512 / 2 = 256
  router_activation: "sigmoid"
  normalization_mode: "fanout"

data:
  data_path: "./edu_fineweb10B"
  use_sharded: true

training:
  total_batch_size: 131072
  per_device_batch_size: 16
  sequence_length: 1024

  learning_rate: 3.0e-4
  min_lr: 1.0e-5
  warmup_steps: 100
  max_epochs: 0.001        # 0.1% of dataset = ~10M tokens
  dataset_tokens: 10_000_000_000  # 10B tokens
  eval_interval: 50        # Frequent evals for metric visualization
  save_interval: 100       # Less frequent saves
  plot_interval: 50        # Generate plots every 50 steps
  grad_clip: 1.0
  weight_decay: 0.1
  mixed_precision: false
  compile_model: false
  lr_schedule: "cosine"
  enable_visualizations: true  # Enable eval visualizations

logging:
  log_interval: 5
  use_wandb: true
  wandb_project: "gec-viz-debug"
