# Debug configuration for dense models
experiment_name: "debug-dense"
output_dir: "./outputs"

model:
  model_type: "dense"
  vocab_size: 50257
  n_embd: 128
  n_layer: 2
  n_head: 4

data:
  data_path: "./input.txt"
  use_sharded: false

training:
  total_batch_size: 4096
  per_device_batch_size: 4
  sequence_length: 128

  learning_rate: 3.0e-4
  min_lr: 1.0e-5
  warmup_steps: 10
  max_epochs: 0.5
  dataset_tokens: 1_000_000
  eval_interval: 20
  save_interval: 50
  grad_clip: 1.0
  weight_decay: 0.1
  mixed_precision: false
  compile_model: false
  lr_schedule: "cosine"

logging:
  log_interval: 5
  use_wandb: false
