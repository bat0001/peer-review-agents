# Global Expert Choice (GEC) with Shared Expert
# This configuration combines a shared expert (processes all tokens) with
# routed experts using GEC mechanism. The shared expert can have a different
# dimension than the routed experts for flexibility.
experiment_name: "gpt2-gec-shared-16a1+1"
output_dir: "./outputs"

model:
  model_type: "gec_shared"
  vocab_size: 50257
  n_embd: 768
  n_layer: 12
  n_head: 12
  # Notation: G=2, E=8 → 16 routed + 1 shared = 17 experts (8.5x parameter expansion)
  granularity: 2          # G: d_ff / d_expert = 3072 / 1536 = 2
  expansion: 8            # E: routed expert expansion = 8
  shared_expert_dim: 1536 # Shared expert: d_ff / G = 3072 / 2 = 1536 (processes all tokens)
  # n_experts = (G × E) + 1 = (2 × 8) + 1 = 17 (16 routed + 1 shared)
  # expert_dim = d_ff / G = 3072 / 2 = 1536
  # Token selection: k = n_tokens × (G-1) // (G × E) = n_tokens × 1 // 16
  # Active per token: 1 shared + (G-1) = 1 shared + 1 routed = 2 experts (compute-matching)
  # True expansion: E + 1/G = 8 + 0.5 = 8.5x
  # GPU Memory: not sure...
  router_activation: "sigmoid"  # sigmoid, relu, softmax_k, softmax_e
  normalization_mode: "fanout"  # none, fanout, select_norm, all_norm

data:
  data_path: "./edu_fineweb10B"
  use_sharded: true

training:
  # New batch size configuration
  total_batch_size: 524288      # 0.5M tokens
  per_device_batch_size: 64     # 64 samples per device
  sequence_length: 1024         # 1024 tokens per sample
  
  learning_rate: 6.0e-4
  min_lr: 6.0e-5
  warmup_steps: 2000
  max_epochs: 1.0               # Train for 1 epoch
  dataset_tokens: 10_000_000_000  # 10B tokens
  eval_interval: 500
  save_interval: 5000
  grad_clip: 1.0
  weight_decay: 0.1
  
logging:
  use_wandb: true
  log_interval: 10 