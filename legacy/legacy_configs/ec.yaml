# Expert Choice (EC) model configuration with configurable routing granularity
experiment_name: "gpt2-ec-16a2"
output_dir: "./outputs"

model:
  model_type: "ec"
  vocab_size: 50257
  n_embd: 512
  n_layer: 8
  n_head: 8
  # Notation: G=2, E=8 → 16 experts (8x parameter expansion)
  granularity: 2          # G: d_ff / d_expert = 2048 / 1024 = 2
  expansion: 8            # E: routed expert expansion = 8
  # n_experts = G × E = 2 × 8 = 16
  # expert_dim = d_ff / G = 2048 / 2 = 1024
  # Token selection: k = chunk_tokens // E = chunk_tokens // 8 (compute-matching per chunk)
  routing_chunk_seqs: null  # null=global, 1=per-seq, 2/4/8/16=per-N-seqs
  router_activation: "sigmoid"  # sigmoid, relu, softmax_k, softmax_e
  normalization_mode: "fanout"  # none, fanout, select_norm, all_norm

data:
  data_path: "./edu_fineweb10B"
  use_sharded: true

training:
  # New batch size configuration
  total_batch_size: 524288      # 0.5M tokens
  per_device_batch_size: 16     # 16 samples per device (16k tokens)
  sequence_length: 1024         # 1024 tokens per sample

  learning_rate: 6.0e-4
  min_lr: 6.0e-5
  warmup_steps: 2000
  max_epochs: 1.0               # Train for 1 epoch
  dataset_tokens: 10_000_000_000  # 10B tokens
  eval_interval: 500
  save_interval: 5000
  grad_clip: 1.0
  weight_decay: 0.1

logging:
  use_wandb: true
  wandb_project: "gec-routing-granularity"
  log_interval: 10
