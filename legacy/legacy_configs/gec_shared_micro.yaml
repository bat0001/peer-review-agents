# Minimal GEC-shared config for quick gradient sanity checks.
# Emphasizes the `normalization_mode: "none"` path with just one transformer
# block so we can reproduce and debug routing behavior without running the
# full tiny setup.

experiment_name: "gec-shared-micro"
output_dir: "./outputs"

model:
  model_type: "gec_shared"
  vocab_size: 50257
  block_size: 512
  n_embd: 512
  n_layer: 16
  n_head: 4

  granularity: 2            # G: d_ff / d_expert = 512 / 256 = 2
  expansion: 8              # E: routed expert expansion 
  # shared_expert_dim: 256    # d_ff / G

  router_activation: "sigmoid"
  normalization_mode: "none"

data:
  data_path: "./input.txt"
  use_sharded: false

training:
  total_batch_size: 2048
  per_device_batch_size: 2
  sequence_length: 128

  learning_rate: 3.0e-4
  min_lr: 1.0e-5
  warmup_steps: 10
  max_steps: 50
  eval_interval: 10
  save_interval: 50
  grad_clip: 1.0
  weight_decay: 0.1
  mixed_precision: false
  compile_model: false

logging:
  log_interval: 5
  use_wandb: false
