# Quick test configuration for mixed precision validation
# Testing threshold routing path for dtype alignment issues
experiment_name: "debug-precision-test"
output_dir: "./outputs"

model:
  model_type: "gec_shared"
  vocab_size: 50257
  n_embd: 128
  n_layer: 4              # Reduced from 12 for quick test
  n_head: 4
  granularity: 2
  expansion: 2
  shared_expert_dim: 256
  router_activation: "sigmoid"
  normalization_mode: "none"

data:
  data_path: "./edu_fineweb10B"
  use_sharded: true

training:
  total_batch_size: 8192   # Much smaller for quick test
  per_device_batch_size: 8
  sequence_length: 512     # Reduced from 1024

  learning_rate: 3.0e-4
  min_lr: 1.0e-5
  warmup_steps: 5          # Reduced from 100
  max_steps: 10            # Just 10 steps to test
  eval_interval: 5
  save_interval: 100
  plot_interval: 5
  grad_clip: 1.0
  weight_decay: 0.1
  mixed_precision: true    # ENABLED for testing
  compile_model: false     # Disabled for clearer error messages
  lr_schedule: "cosine"
  enable_visualizations: false  # Disabled to reduce overhead

logging:
  log_interval: 1
  use_wandb: false         # Disabled for quick local test
  wandb_project: "gec-precision-test"
