# @package _global_
# Threshold training experiment
# Tests threshold routing with dual-mode training (top-k for EMA + threshold for routing)

training:
  total_batch_size: 65536   # Small batch for testing
  max_steps: 100            # Test with 100 steps (will stop at min(max_steps, steps_from_epochs))
  ema_start_steps: 20       # Start updating cutoff EMA during top-k phase
  threshold_warmup_steps: 50  # Switch to threshold after 50 steps (need time for router to learn)
  eval_interval: 20
  save_interval: 50
  per_device_batch_size: 4

  enable_visualizations: false
  compile_model: false      # Disable compile initially to test compatibility

logging:
  use_wandb: false          # No wandb for debugging
  log_interval: 5

defaults:
  - override /model_size: tiny
  - override /mlp: gec_shared
