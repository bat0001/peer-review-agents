# @package _global_
# Preset: Dense Medium configuration
# Usage: python train.py --config-name=presets/dense_medium

defaults:
  - /model_size: medium
  - /mlp: dense
  - /training: standard
  - /experiment: full_run
  - _self_

# Experiment metadata
experiment_name: "dense-medium-baseline"
output_dir: "./outputs/${experiment_name}"

# Data settings
data:
  data_path: "${oc.env:NANOCHAT_BASE_DIR}/base_data"
  tokenizer_type: "rustbpe"
  tokenizer_dir: "${oc.env:NANOCHAT_BASE_DIR}/tokenizer"
  tokenizer_threads: 4
  tokenizer_batch_size: 128
  nanochat_base_dir: "${oc.env:NANOCHAT_BASE_DIR}"
  num_workers: 4

# Training settings (merged with /training: standard)
training:
  per_device_batch_size: 16
  compile_model: true
  mixed_precision: true
  seed: 42

# Logging settings
logging:
  use_wandb: true
  wandb_entity: null
  log_interval: 10
