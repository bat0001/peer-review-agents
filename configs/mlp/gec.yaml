# @package _global_
# GEC (Global Expert Choice) - routed experts only, no shared expert
# Notation: G=2, E=8 → 16 routed experts total
# Token selection: k = n_tokens // E

model:
  model_type: gec

  # Expert configuration
  granularity: 2          # G: d_ff / d_expert
  expansion: 8            # E: routed expert expansion
  # n_experts = G × E = 16
  # expert_dim = d_ff / G (e.g., 2048/2=1024 for tiny, 4096/2=2048 for medium)

  # Router settings
  router_activation: sigmoid  # sigmoid, relu, softmax_k, softmax_e

# Metadata for experiment naming
mlp_type_name: gec
