# @package _global_
# GEC-shared with softmax_e_shared_out: Shared expert OUT of softmax
# Routed weights from softmax (sum to 1), shared weight = 1/G
# Total weight per token <= 1 + 1/G

model:
  model_type: gec_shared

  # Expert configuration
  granularity: 2          # G: d_ff / d_expert
  expansion: 8            # E: routed expert expansion
  shared_expert_dim: 1024 # d_ff / G

  # Router settings - softmax_e with shared out of softmax
  router_activation: softmax_e_shared_out

# Metadata for experiment naming
mlp_type_name: gec_shared_softmax_out
