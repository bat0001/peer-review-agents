# @package _global_
# Canonical expert-choice config without shared expert

model:
  model_type: expert_choice
  shared_expert: false

  # Expert configuration
  granularity: 2
  expansion: 8

  # Routing settings
  selection_policy: topk
  router_activation: sigmoid
  routing_chunk_seqs: null

# Metadata for experiment naming
mlp_type_name: expert_choice_no_shared
