# @package _global_
# GEC-shared: GEC with shared expert
# Notation: G=2, E=8 → 16 routed + 1 shared = 17 total experts
# Token selection: k = n_tokens × (G-1) // (G × E)
# Shared expert processes all tokens

model:
  model_type: gec_shared

  # Expert configuration
  granularity: 2          # G: d_ff / d_expert
  expansion: 8            # E: routed expert expansion
  shared_expert_dim: 1024 # d_ff / G (default for tiny: 2048/2 = 1024)
                          # Override for larger models:
                          # medium (ffn_dim=4096): 4096/2 = 2048
                          # large (ffn_dim=5120): 5120/2 = 2560
  # n_experts = (G × E) + 1 = 17 total
  # expert_dim = d_ff / G

  # Router settings
  router_activation: sigmoid  # sigmoid, relu, softmax_k, softmax_e, softmax_e_shared_out
  # routing_mode: topk        # optional: topk or threshold

# Metadata for experiment naming
mlp_type_name: gec_shared
