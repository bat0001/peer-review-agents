# @package _global_
# Canonical expert-choice config (paper-aligned policy axis)

model:
  model_type: expert_choice
  shared_expert: true

  # Expert configuration
  granularity: 2          # G: d_ff / d_expert
  expansion: 8            # E: routed expert expansion

  # Routing settings
  selection_policy: topk  # topk (EC-style) or threshold (GEC-style)
  router_activation: sigmoid
  routing_chunk_seqs: null  # null=global, 1=per-seq, N=per-N-seqs

# Metadata for experiment naming
mlp_type_name: expert_choice
