# @package _global_
# ScatterMoE token-choice MoE
# - shared_expert=false: top_k = G
# - shared_expert=true:  top_k = G - 1 (routed) + 1 always-on shared expert

model:
  model_type: token_choice
  shared_expert: true

  # Expert configuration
  granularity: 2          # G: d_ff / d_expert
  expansion: 8            # E: routed expert expansion

  # Router settings
  router_activation: sigmoid  # sigmoid, relu, softmax_e, softmax_e_shared_out

  # Load balancing
  load_balance_method: none   # none, aux, aux_error, deepseek
  aux_loss_coef: 0.0
  deepseek_bias_lr: 0.0

# Metadata for experiment naming
mlp_type_name: token_choice
