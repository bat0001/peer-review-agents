# @package _global_
# EC config: top-k expert-choice routing via the unified ET wrapper

model:
  model_type: expert_threshold
  shared_expert: true

  # Expert configuration
  granularity: 2
  expansion: 8

  # Routing settings
  selection_policy: topk
  router_activation: sigmoid
  routing_chunk_seqs: null

# Metadata for experiment naming
mlp_type_name: ec
